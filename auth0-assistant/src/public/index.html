<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Auth0 Assistant</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #f0f2f5;
      height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ─────────────────────────────────────────────────────── */
    header {
      background: #1a1a2e;
      color: #fff;
      padding: 12px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }
    header h1 { font-size: 17px; font-weight: 600; }
    #auth-area { display: flex; align-items: center; gap: 12px; }
    #user-name { font-size: 13px; color: #ccc; }
    .btn {
      padding: 6px 14px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
    }
    .btn-login  { background: #4f8ef7; color: #fff; }
    .btn-logout { background: #c0392b; color: #fff; }
    .btn-connect { background: #27ae60; color: #fff; padding: 7px 16px; font-size: 13px; }

    /* ── Main layout ─────────────────────────────────────────────────── */
    main {
      flex: 1;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      max-width: 760px;
      width: 100%;
      margin: 0 auto;
      padding: 16px 16px 0;
      gap: 10px;
    }

    /* ── Auth banner ─────────────────────────────────────────────────── */
    #auth-banner {
      display: none;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      background: #fff8e1;
      border: 1px solid #f9a825;
      border-radius: 8px;
      padding: 10px 14px;
    }
    #auth-banner.visible { display: flex; }
    #auth-banner p { font-size: 13px; color: #5d4037; flex: 1; }

    /* ── Messages ────────────────────────────────────────────────────── */
    #messages {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 10px;
      padding-bottom: 4px;
    }

    .msg {
      max-width: 82%;
      padding: 10px 14px;
      border-radius: 14px;
      font-size: 14px;
      line-height: 1.55;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .msg.user {
      background: #4f8ef7;
      color: #fff;
      align-self: flex-end;
      border-bottom-right-radius: 4px;
    }
    .msg.assistant {
      background: #fff;
      color: #222;
      align-self: flex-start;
      border-bottom-left-radius: 4px;
      box-shadow: 0 1px 3px rgba(0,0,0,.08);
    }
    .msg.assistant:empty::after {
      content: '▋';
      animation: blink .8s step-end infinite;
    }
    @keyframes blink { 50% { opacity: 0; } }

    /* ── Status pill ─────────────────────────────────────────────────── */
    #status {
      font-size: 12px;
      color: #888;
      text-align: center;
      min-height: 18px;
      padding: 2px 0;
    }

    /* ── Input row ───────────────────────────────────────────────────── */
    #input-row {
      display: flex;
      gap: 8px;
      padding-bottom: 16px;
      flex-shrink: 0;
    }
    #msg-input {
      flex: 1;
      padding: 10px 14px;
      border: 1px solid #ddd;
      border-radius: 10px;
      resize: none;
      font-size: 14px;
      font-family: inherit;
      line-height: 1.4;
      background: #fff;
    }
    #msg-input:focus { outline: none; border-color: #4f8ef7; }
    #msg-input:disabled { background: #f5f5f5; }
    #send-btn {
      padding: 0 18px;
      background: #4f8ef7;
      color: #fff;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      min-width: 72px;
    }
    #send-btn:disabled { background: #b0c4de; cursor: not-allowed; }
  </style>
</head>
<body>
  <header>
    <h1>Auth0 Assistant</h1>
    <div id="auth-area">
      <span id="user-name"></span>
      <button id="auth-btn" class="btn btn-login">Log In</button>
    </div>
  </header>

  <main>
    <div id="auth-banner">
      <p>This assistant needs access to your Google account to read and compose emails.</p>
      <button id="connect-btn" class="btn btn-connect">Connect Google</button>
    </div>

    <div id="messages"></div>
    <div id="status"></div>

    <div id="input-row">
      <textarea
        id="msg-input"
        placeholder="Ask me to search or compose emails…"
        rows="2"
        disabled
      ></textarea>
      <button id="send-btn" disabled>Send</button>
    </div>
  </main>

  <script src="/app.js"></script>
</body>
</html>
